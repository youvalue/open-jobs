<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="description" content="Open job platform for everyone — built on GitHub Issues, zero server cost.">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>OpenJobs</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-left">
      <a href="#/" class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>
        <span data-i18n="app.name">OpenJobs</span>
      </a>
      <span class="slogan" data-i18n="app.tagline">Open job platform for everyone</span>
      <nav class="tabs">
        <a href="#/resumes" class="tab" data-tab="resumes" data-i18n="nav.resumes">Resumes</a>
        <a href="#/jobs" class="tab" data-tab="jobs" data-i18n="nav.jobs">Jobs</a>
        <a href="#/about" class="tab" data-tab="about" data-i18n="nav.about">About</a>
      </nav>
    </div>
    <div class="header-right">
      <a href="https://github.com/youvalue/open-jobs" target="_blank" class="github-link" title="GitHub">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      </a>
      <select id="lang-select" aria-label="Language"></select>
      <div id="auth-area"></div>
    </div>
  </header>

  <main id="main">
    <div id="loading" class="loading" data-i18n="common.loading">Loading...</div>
    <div id="content"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
