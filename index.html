<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenJobs</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header id="header">
    <div class="header-left">
      <a href="#/" class="logo" data-i18n="app.name">OpenJobs</a>
      <nav class="tabs">
        <a href="#/resumes" class="tab" data-tab="resumes" data-i18n="tab.resumes">Resumes</a>
        <a href="#/jobs" class="tab" data-tab="jobs" data-i18n="tab.jobs">Jobs</a>
      </nav>
    </div>
    <div class="header-right">
      <select id="lang-select" aria-label="Language"></select>
      <div id="auth-area"></div>
    </div>
  </header>

  <main id="main">
    <div id="loading" class="loading" data-i18n="common.loading">Loading...</div>
    <div id="content"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
